<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMICRON Pick-up Service | Professional Portal</title>
    <style>
        :root { 
            --primary: #0056b3; 
            --primary-dark: #003d82;
            --bg: #f4f7f9; 
            --card: #ffffff; 
            --success: #28a745; 
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); padding: 0; margin: 0; color: #333; line-height: 1.5; }

        /* --- MODERN LANGUAGE PANEL --- */
        .language-header {
            background: var(--primary);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        .language-button-wrapper {
            background: white;
            padding: 8px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .language-button-wrapper:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }

        .globus-icon {
            font-size: 20px;
            display: flex;
            align-items: center;
        }

        .language-text {
            font-weight: 700;
            font-size: 0.9em;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #google_translate_element {
            display: inline-block;
        }

        .goog-te-gadget-simple {
            background-color: transparent !important;
            border: none !important;
            padding: 0 !important;
            font-size: 14px !important;
            font-weight: 600 !important;
        }

        .goog-te-menu-value {
            margin: 0 !important;
            display: flex !important;
            align-items: center !important;
        }

        .goog-te-menu-value span {
            color: var(--primary) !important;
            text-decoration: none !important;
        }

        .goog-te-banner-frame.skiptranslate, .goog-te-gadget img, .goog-te-gadget span {
            display: none !important;
        }
        body { top: 0px !important; }
        .skiptranslate iframe { display: none !important; }

        /* --- FORM LAYOUT --- */
        .container { max-width: 850px; margin: 40px auto; background: var(--card); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
        .header { background: #fff; color: var(--primary); padding: 40px 30px; text-align: center; border-bottom: 1px solid #eee; }
        .header h2 { margin: 0; font-size: 2.2em; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }
        
        .form-body { padding: 40px; }
        .section { margin-bottom: 40px; border-left: 5px solid var(--primary); padding-left: 25px; }
        .section-title { font-weight: 800; font-size: 1.2em; margin-bottom: 25px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .full { grid-column: span 2; }
        
        label { display: block; margin-bottom: 10px; font-weight: 700; font-size: 0.9em; color: #444; }
        input, select, textarea { width: 100%; padding: 14px; border: 2px solid #e1e4e8; border-radius: 8px; font-size: 1em; box-sizing: border-box; transition: all 0.2s; }
        input:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(0,86,179,0.1); }

        .count-selector { background: #f0f7ff; padding: 30px; border-radius: 12px; margin-bottom: 30px; border: 2px dashed var(--primary); display: flex; align-items: center; justify-content: center; gap: 20px; }
        .count-input { font-size: 1.5em; font-weight: 800; color: var(--primary); border: 3px solid var(--primary); width: 90px !important; text-align: center; border-radius: 10px; }
        
        .package-card { background: #fff; border: 2px solid #edf0f2; padding: 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .dimensions { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
        
        button#submitBtn { background: var(--primary); color: white; border: none; padding: 22px; font-size: 1.2em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; transition: all 0.3s; }
        button#submitBtn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        #success-overlay { display: none; padding: 80px 40px; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .success-icon { font-size: 80px; color: var(--success); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="language-header">
    <div class="language-button-wrapper" onclick="document.querySelector('.goog-te-menu-value').click();">
        <span class="globus-icon">🌐</span>
        <span class="language-text">Select Language / Sprache wählen</span>
        <div id="google_translate_element"></div>
    </div>
</div>

<div class="container">
    <div id="success-overlay">
        <div class="success-icon">✓</div>
        <h1>Thank You!</h1>
        <p>Your pickup order has been successfully submitted. We will send the shipping documents to you via email shortly.</p>
        <button onclick="location.reload()" style="background:var(--primary); color:white; border:none; padding:15px 30px; border-radius:8px; cursor:pointer; font-weight:bold;">New Order</button>
    </div>

    <div id="main-content">
        <div class="header">
            <h2>OMICRON Pick-up Service</h2>
        </div>

        <form class="form-body" id="pickupForm">
            <div class="section">
                <div class="section-title">1. Sender & Contact</div>
                <div class="grid">
                    <div class="full"><label>Company *</label><input type="text" name="Absender_Firma" required></div>
                    <div><label>Contact Person *</label><input type="text" name="Kontaktperson" required></div>
                    <div><label>Phone *</label><input type="tel" name="Telefon" required></div>
                    <div class="full"><label>Email *</label><input type="email" name="Absender_Email" required></div>
                    <div><label>City *</label><input type="text" name="Ort" required></div>
                    <div><label>Zip Code *</label><input type="text" name="PLZ" required></div>
                    <div class="full"><label>Street, House No. *</label><input type="text" name="Strasse_Hnr" required></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">2. Device Information</div>
                <div style="margin-bottom: 25px;">
                    <label>Models & Accessories *</label>
                    <textarea name="Geraete_Liste" rows="3" placeholder="e.g. CMC 356, Cable Set" required></textarea>
                </div>
                <div class="grid">
                    <div><label>Serial Number(s) *</label><input type="text" name="Seriennummern" required></div>
                    <div><label>Reason for Service *</label><input type="text" name="Service_Grund" placeholder="Repair / Calibration" required></div>
                </div>
            </div>

            <div class="count-selector">
                <label style="margin-bottom:0; font-size:1.1em;">Total number of packages:</label>
                <input type="number" id="packageCount" name="Anzahl_Packstuecke" value="1" min="1" max="15" class="count-input">
            </div>

            <div class="section">
                <div class="section-title">3. Package Details</div>
                <div id="packageContainer"></div>
            </div>

            <div class="section">
                <div class="section-title">4. Pickup</div>
                <div class="grid">
                    <div><label>Requested Date *</label><input type="date" id="pickupDate" name="Abholdatum" required></div>
                    <div><label>Time Slot</label><input type="text" name="Zeitfenster" placeholder="e.g. 09:00 AM - 12:00 PM"></div>
                </div>
            </div>

            <button type="submit" id="submitBtn">Submit Pickup Order Now</button>
        </form>
    </div>
</div>

<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'en',
            includedLanguages: 'de,en,es,pt,fr,it,nl,pl,tr,ru,zh-CN,ja,ar,hi,cs,hu,ro,sk,sv,da,fi,no,el,bg,hr,uk',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
        }, 'google_translate_element');
    }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
    const container = document.getElementById('packageContainer');
    const selector = document.getElementById('packageCount');
    const pickupForm = document.getElementById('pickupForm');
    const dateInput = document.getElementById('pickupDate');

    function setMinDate() {
        const today = new Date().toISOString().split('T')[0];
        dateInput.setAttribute('min', today);
    }

    function renderPackages() {
        let count = parseInt(selector.value) || 1;
        container.innerHTML = '';
        for (let i = 1; i <= count; i++) {
            const card = document.createElement('div');
            card.className = 'package-card';
            card.innerHTML = `
                <div style="font-weight:bold; margin-bottom:15px; color:var(--primary);">PACKAGE #${i}</div>
                <div style="margin-bottom:15px;">
                    <label>Packaging Type *</label>
                    <select name="P${i}_Typ" required>
                        <option value="Paket">Parcel / Box</option>
                        <option value="Koffer">Original Case</option>
                        <option value="Palette">Pallet</option>
                    </select>
                </div>
                <div class="dimensions">
                    <div><label>L (cm)</label><input type="number" name="P${i}_L" required></div>
                    <div><label>W (cm)</label><input type="number" name="P${i}_B" required></div>
                    <div><label>H (cm)</label><input type="number" name="P${i}_H" required></div>
                    <div><label>Weight (kg)</label><input type="number" name="P${i}_Gewicht" step="0.1" required></div>
                </div>
            `;
            container.appendChild(card);
        }
    }
    
    selector.addEventListener('input', renderPackages);
    window.addEventListener('DOMContentLoaded', () => {
        renderPackages();
        setMinDate();
    });

    pickupForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "SUBMITTING...";

        const formData = new FormData(pickupForm);
        fetch("https://script.google.com/macros/s/AKfycbz34Tfa1a0jpe2-qtF1lt8Qy42cY9HurHQ9JPp8zVgAji7GFZ3yVCYLwymxjOaoCbwYKQ/exec", {
            method: 'POST',
            body: formData,
            mode: 'no-cors'
        }).then(() => {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('success-overlay').style.display = 'flex';
            window.scrollTo(0, 0);
        }).catch(err => {
            alert("Error while submitting.");
            btn.disabled = false;
            btn.innerText = "Submit Pickup Order Now";
        });
    });
</script>
</body>
</html>
