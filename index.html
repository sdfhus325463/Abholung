<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMICRON Pick-up Service | Professional Portal</title>
    <style>
        :root { --primary: #0056b3; --bg: #f4f7f9; --card: #ffffff; --warn-bg: #fff3cd; --warn-border: #ffeeba; --warn-text: #856404; --success: #28a745; }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); padding: 20px; color: #333; line-height: 1.5; }
        .container { max-width: 850px; margin: 0 auto; background: var(--card); border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; position: relative; }
        .header { background: var(--primary); color: white; padding: 25px; text-align: center; }
        .header h2 { margin: 0; font-size: 1.8em; letter-spacing: 1px; }
        .form-body { padding: 30px; }
        .section { margin-bottom: 35px; border-left: 4px solid var(--primary); padding-left: 20px; }
        .section-title { font-weight: 700; font-size: 1.1em; margin-bottom: 15px; color: var(--primary); text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85em; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95em; box-sizing: border-box; }
        .count-selector { background: #e7f3ff; padding: 25px; border-radius: 8px; margin-bottom: 25px; border: 2px solid var(--primary); }
        .count-input { font-size: 1.2em; font-weight: bold; color: var(--primary); border: 2px solid var(--primary); width: 100px !important; }
        .package-card { background: #f8f9fa; border: 1px solid #e1e4e8; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .dimensions { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
        button { background: var(--primary); color: white; border: none; padding: 20px; font-size: 1.1em; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 700; margin-top: 20px; }
        
        /* Erfolgsmeldung Overlay */
        #success-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }
        .success-icon { font-size: 4em; color: var(--success); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="success-overlay">
        <div class="success-icon">✓</div>
        <h2>Auftrag erfolgreich übermittelt</h2>
        <p>Vielen Dank! Ihr Abholauftrag wurde im System registriert und wird nun verarbeitet.<br>Sie erhalten in Kürze eine Bestätigung per E-Mail.</p>
        <button onclick="location.reload()" style="width: auto; padding: 10px 30px; background: #6c757d;">Neuer Auftrag</button>
    </div>

    <div class="header">
        <h2>OMICRON Pick-up Service</h2>
    </div>

    <form class="form-body" id="pickupForm">
        <div class="section">
            <div class="section-title">1. Absender & Kontakt</div>
            <div class="grid">
                <div class="full"><label>Firma *</label><input type="text" name="Absender_Firma" required></div>
                <div><label>Ansprechpartner *</label><input type="text" name="Kontaktperson" required></div>
                <div><label>Telefon *</label><input type="tel" name="Telefon" required></div>
                <div class="full"><label>E-Mail *</label><input type="email" name="Absender_Email" required></div>
                <div><label>Ort *</label><input type="text" name="Ort" required></div>
                <div><label>PLZ *</label><input type="text" name="PLZ" required></div>
                <div class="full"><label>Straße, Hausnr. *</label><input type="text" name="Strasse_Hnr" required></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">2. Geräte-Infos</div>
            <textarea name="Geraete_Liste" rows="3" placeholder="Modelle & Zubehör..." required></textarea>
            <div style="margin-top:15px;">
                <label>Seriennummer(n) *</label>
                <input type="text" name="Seriennummern" required>
            </div>
        </div>

        <div class="count-selector">
            <label>Anzahl Packstücke</label>
            <input type="number" id="packageCount" name="Anzahl_Packstuecke" value="1" min="1" max="15" class="count-input">
        </div>

        <div class="section">
            <div class="section-title">3. Details der Packstücke</div>
            <div id="packageContainer"></div>
        </div>

        <div class="section">
            <div class="section-title">4. Terminierung</div>
            <div class="grid">
                <div><label>Wunschdatum *</label><input type="date" id="pickupDate" name="Abholdatum" required></div>
                <div><label>Zeitfenster</label><input type="text" name="Zeitfenster" placeholder="z.B. 08:00 - 15:00"></div>
            </div>
        </div>

        <button type="submit" id="submitBtn">Abholauftrag verbindlich senden</button>
    </form>
</div>

<script>
    // DEINE LOGIK FÜR DYNAMISCHE FELDER (BLEIBT BESTEHEN)
    const container = document.getElementById('packageContainer');
    const selector = document.getElementById('packageCount');
    const pickupForm = document.getElementById('pickupForm');

    function renderPackages() {
        let count = parseInt(selector.value) || 1;
        container.innerHTML = '';
        for (let i = 1; i <= count; i++) {
            const card = document.createElement('div');
            card.className = 'package-card';
            card.innerHTML = `
                <div style="font-weight:bold; margin-bottom:10px;">Packstück #${i}</div>
                <div class="dimensions">
                    <input type="number" name="P${i}_L" placeholder="L (cm)" required>
                    <input type="number" name="P${i}_B" placeholder="B (cm)" required>
                    <input type="number" name="P${i}_H" placeholder="H (cm)" required>
                    <input type="number" name="P${i}_KG" placeholder="KG" required>
                </div>
            `;
            container.appendChild(card);
        }
    }
    selector.addEventListener('input', renderPackages);
    window.addEventListener('DOMContentLoaded', renderPackages);

    // NEUE VERSAND-LOGIK (HINTERGRUND)
    pickupForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Wird sicher übertragen...";

        const formData = new FormData(pickupForm);
        
        // HIER die URL deines Google Scripts oder Form-Dienstes eintragen
        const ACTION_URL = "https://script.google.com/macros/s/AKfycbxLgQ4DqujjQAz8CJMsNWY1Eq_VBGwkW_mnaDWz5nGSRew8mCbFr4hR8Om8wA2a0cnmvA/exec";

        fetch(ACTION_URL, {
            method: 'POST',
            body: formData,
            mode: 'no-cors' // Wichtig für Google Apps Script
        }).then(() => {
            // Zeige Erfolgsmeldung statt E-Mail Programm
            document.getElementById('success-overlay').style.display = 'flex';
            window.scrollTo(0, 0);
        }).catch(err => {
            alert("Fehler beim Senden. Bitte prüfen Sie Ihre Internetverbindung.");
            btn.disabled = false;
        });
    });
</script>
</body>
</html>
