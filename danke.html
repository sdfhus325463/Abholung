<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vielen Dank | OMICRON Pick-up Service</title>
    <style>
        :root { --primary: #0056b3; --bg: #f4f7f9; --card: #ffffff; }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #333; }
        .card { background: var(--card); padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
        .icon { font-size: 50px; color: #28a745; margin-bottom: 20px; }
        h1 { color: var(--primary); margin-bottom: 10px; }
        p { line-height: 1.6; color: #555; }
        .btn { display: inline-block; margin-top: 25px; padding: 12px 25px; background: var(--primary); color: white; text-decoration: none; border-radius: 6px; font-weight: 600; transition: 0.2s; }
        .btn:hover { background: #003d82; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✓</div>
        <h1>Vielen Dank!</h1>
        <p>Ihr Abholauftrag wurde erfolgreich übermittelt. Wir prüfen die Daten und senden Ihnen die Versanddokumente in Kürze an die angegebene E-Mail-Adresse.</p>
        <a href="index.html" class="btn">Zurück zur Startseite</a>
    </div>
</body>
</html>
